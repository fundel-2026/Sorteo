<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Admin - Sorteo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="./assets/admin-BRH_UdFu.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/firebase-BTUicv2u.js">
  <link rel="stylesheet" crossorigin href="./assets/firebase-DHPKMqr2.css">
</head>

<body class="admin-body">

    <div class="dashboard-container">
        <!-- Header -->
        <header class="admin-header">
            <div class="logo" style="font-size: 1.5rem; margin: 0;">✨ Panel<span>Admin</span></div>

            <div class="stats-card">
                <span class="stats-number" id="total-count">0</span>
                <span class="stats-label">Registrados</span>
            </div>

            <div class="admin-actions">
                <button class="btn-primary" id="export-btn">📥 Descargar Excel</button>
            </div>
        </header>

        <!-- Podium / Top Winners Section -->
        <section class="podium-area">
            <h2 class="podium-title">🏆 Cuadro de Honor</h2>
            <div class="podium-container" id="podium-container">
                <!-- Winners Card 2 -->
                <div class="podium-card silver" id="winner-2">
                    <div class="podium-rank">2</div>
                    <div class="podium-info">
                        <h3 class="podium-name">---</h3>
                        <p class="podium-stats">-- s | --/5</p>
                    </div>
                </div>
                <!-- Winners Card 1 -->
                <div class="podium-card gold" id="winner-1">
                    <div class="podium-rank">1</div>
                    <div class="podium-info">
                        <h3 class="podium-name">Esperando registros...</h3>
                        <p class="podium-stats">0 s | 0/5</p>
                    </div>
                </div>
                <!-- Winners Card 3 -->
                <div class="podium-card bronze" id="winner-3">
                    <div class="podium-rank">3</div>
                    <div class="podium-info">
                        <h3 class="podium-name">---</h3>
                        <p class="podium-stats">-- s | --/5</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Data Table -->
        <h3 style="margin-top: 2rem;">Lista de Registros</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Participante</th>
                        <th>Aciertos</th>
                        <th>Tiempo (s)</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Rows here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Confetti -->
    <script>
        // Simple export logic if module fails, or handled in admin.js
    </script>
</body>

</html>
