<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro Sorteo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/style.css">
</head>

<body>
  <!-- Background Blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <main id="app-container">
    <div class="glass-card">
      <!-- Header -->
      <header class="app-header">
        <div class="logo">✨ Registro<span>Sorteo</span></div>
        <p class="subtitle">Ingresa tus datos para participar</p>
      </header>

      <!-- View: Form -->
      <div id="view-form" class="view-section active">
        <form id="register-form">

          <!-- 1. Nombre -->
          <div class="input-group">
            <label for="fullName">Nombre Completo</label>
            <input type="text" id="fullName" required placeholder="Ingresa tu nombre" autocomplete="name">
          </div>

          <div class="quiz-instructions">
            <p>Responde las siguientes preguntas de FUNDEL lo más rápido posible:</p>
          </div>

          <!-- Q1 -->
          <div class="input-group">
            <div class="quiz-image-container">
              <img src="https://fundel.edu.ec/wp-content/uploads/2023/05/Logo-Fundel-22-Anos.png"
                alt="Aniversario FUNDEL" class="quiz-img">
            </div>
            <label>1. ¿A cuántos años de trayectoria llegó FUNDEL?</label>
            <div class="radio-stack">
              <label><input type="radio" name="q1" value="10 años" required> 10 años</label>
              <label><input type="radio" name="q1" value="15 años" required> 15 años</label>
              <label><input type="radio" name="q1" value="22 años" required> 22 años</label>
              <label><input type="radio" name="q1" value="25 años" required> 25 años</label>
            </div>
          </div>

          <!-- Q2 -->
          <div class="input-group">
            <div class="quiz-image-container">
              <img src="https://fundel.edu.ec/wp-content/uploads/2023/10/Directora-Ejecutiva.jpg" alt="Directora FUNDEL"
                class="quiz-img">
            </div>
            <label>2. ¿Cuál es el nombre de la Directora Ejecutiva de FUNDEL?</label>
            <div class="radio-stack">
              <label><input type="radio" name="q2" value="Lic. Erica Tenorio" required> Lic. Erica Tenorio</label>
              <label><input type="radio" name="q2" value="Lic. Bárbara Tello" required> Lic. Bárbara Tello</label>
              <label><input type="radio" name="q2" value="Ing. Erica Yansapanta" required> Ing. Erica Yansapanta</label>
              <label><input type="radio" name="q2" value="Ing. Bárbara Tenorio" required> Ing. Bárbara Tenorio</label>
            </div>
          </div>

          <!-- Q3 -->
          <div class="input-group">
            <div class="quiz-image-container">
              <img src="https://fundel.edu.ec/wp-content/uploads/2023/05/Sedes-Fundel.jpg" alt="Sedes FUNDEL"
                class="quiz-img">
            </div>
            <label>3. ¿En qué ciudades está presente FUNDEL?</label>
            <div class="radio-stack">
              <label><input type="radio" name="q3" value="Quito, Guayaquil y Cuenca" required> Quito, Guayaquil y
                Cuenca</label>
              <label><input type="radio" name="q3" value="Ambato, Latacunga, Riobamba y Puyo" required> Ambato,
                Latacunga, Riobamba y Puyo</label>
              <label><input type="radio" name="q3" value="Riobamba, Ibarra y Loja" required> Riobamba, Ibarra y
                Loja</label>
              <label><input type="radio" name="q3" value="Ambato, Riobamba, Quito y Guayaquil" required> Ambato,
                Riobamba, Quito y Guayaquil</label>
            </div>
          </div>

          <!-- Q4 -->
          <div class="input-group">
            <div class="quiz-image-container">
              <img src="https://fundel.edu.ec/wp-content/uploads/2023/05/Eslogan-Fundel.jpg" alt="Eslogan FUNDEL"
                class="quiz-img">
            </div>
            <label>4. ¿Cuál es el eslogan de FUNDEL?</label>
            <div class="radio-stack">
              <label><input type="radio" name="q4" value="Tu primer paso a la superación" required> Tu primer paso a la
                superación</label>
              <label><input type="radio" name="q4" value="Formando líderes del mañana" required> Formando líderes del
                mañana</label>
              <label><input type="radio" name="q4" value="Creciendo juntos hacia el futuro" required> Creciendo juntos
                hacia el futuro</label>
              <label><input type="radio" name="q4" value="Educación que transforma vidas" required> Educación que
                transforma vidas</label>
            </div>
          </div>

          <!-- Q5 -->
          <div class="input-group">
            <div class="quiz-image-container">
              <img src="https://fundel.edu.ec/wp-content/uploads/2023/05/Siglas-Fundel.jpg" alt="Siglas"
                class="quiz-img">
            </div>
            <label>5. ¿Qué significan las siglas de FUNDEL?</label>
            <div class="radio-stack">
              <label><input type="radio" name="q5" value="Fundación Nacional de Educación y Liderazgo" required>
                Fundación Nacional de Educación y Liderazgo</label>
              <label><input type="radio" name="q5" value="Fondo Unido para el Desarrollo Local" required> Fondo Unido
                para el Desarrollo Local</label>
              <label><input type="radio" name="q5" value="Fundación de Desarrollo Humano y Social Latacunga" required>
                Fundación de Desarrollo Humano y Social Latacunga</label>
              <label><input type="radio" name="q5" value="Fundación de Unidad y Desarrollo Estudiantil Latacunga"
                  required> Fundación de Unidad y Desarrollo Estudiantil Latacunga</label>
            </div>
          </div>

          <button type="submit" class="btn-primary glow" id="submit-btn" style="margin-top: 20px;">🚀
            ¡Enviar Respuestas!</button>
        </form>
      </div>

      <!-- View: Success -->
      <div id="view-success" class="view-section hidden">
        <div class="success-icon">🎉</div>
        <h3>¡Registro Exitoso!</h3>
        <p>Ya estás participando en el sorteo.</p>
        <button class="btn-secondary" id="back-btn">Registrar a otra persona</button>
      </div>

    </div>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="./src/register.js"></script>
</body>

</html>
